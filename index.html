<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown to 25 August 2026</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1f2a60, #070812 65%);
      color: white;
    }

    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(#ffffff 1px, transparent 1px),
        radial-gradient(#8ab4ff 1px, transparent 1px);
      background-size: 80px 80px, 130px 130px;
      animation: moveStars 40s linear infinite;
      opacity: 0.35;
    }

    @keyframes moveStars {
      from { transform: translateY(0); }
      to { transform: translateY(-300px); }
    }

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: #6c63ff;
      filter: blur(140px);
      opacity: 0.35;
      animation: pulse 5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.25; }
      50% { transform: scale(1.25); opacity: 0.45; }
    }

    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 1050px;
      padding: 45px;
      border-radius: 35px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.45);
      text-align: center;
      animation: fadeUp 1.2s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: clamp(32px, 5vw, 64px);
      margin-bottom: 15px;
      background: linear-gradient(90deg, #ffffff, #9fb7ff, #ffffff);
      -webkit-background-clip: text;
      color: transparent;
      animation: shine 4s linear infinite;
      background-size: 200%;
    }

    @keyframes shine {
      from { background-position: 0%; }
      to { background-position: 200%; }
    }

    .subtitle {
      color: #cfd6ff;
      font-size: 18px;
      margin-bottom: 40px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 18px;
    }

    .box {
      padding: 28px 15px;
      border-radius: 25px;
      background: linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: inset 0 0 25px rgba(255,255,255,0.04),
                  0 15px 35px rgba(0,0,0,0.25);
      transform-style: preserve-3d;
      animation: float 4s ease-in-out infinite;
    }

    .box:nth-child(2) { animation-delay: .2s; }
    .box:nth-child(3) { animation-delay: .4s; }
    .box:nth-child(4) { animation-delay: .6s; }
    .box:nth-child(5) { animation-delay: .8s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .num {
      font-size: clamp(34px, 5vw, 62px);
      font-weight: 800;
      text-shadow: 0 0 25px rgba(120, 150, 255, 0.8);
    }

    .label {
      margin-top: 8px;
      color: #aebaff;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .status {
      margin-top: 35px;
      font-size: 14px;
      color: #b8c1ff;
      opacity: 0.85;
    }

    .progress {
      margin-top: 28px;
      height: 10px;
      width: 100%;
      border-radius: 50px;
      background: rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6c63ff, #00e5ff, #9bffcb);
      border-radius: 50px;
      box-shadow: 0 0 25px #00e5ff;
      transition: width 0.3s ease;
    }

    @media (max-width: 850px) {
      .countdown {
        grid-template-columns: repeat(2, 1fr);
      }

      .box:last-child {
        grid-column: span 2;
      }
    }
  </style>
</head>

<body>
  <div class="stars"></div>
  <div class="glow"></div>

  <main class="container">
    <h1>До 25 августа 2026</h1>
    <p class="subtitle">Обратный отсчёт с интернет-временем и миллисекундами</p>

    <div class="countdown">
      <div class="box">
        <div class="num" id="days">00</div>
        <div class="label">Дней</div>
      </div>
      <div class="box">
        <div class="num" id="hours">00</div>
        <div class="label">Часов</div>
      </div>
      <div class="box">
        <div class="num" id="minutes">00</div>
        <div class="label">Минут</div>
      </div>
      <div class="box">
        <div class="num" id="seconds">00</div>
        <div class="label">Секунд</div>
      </div>
      <div class="box">
        <div class="num" id="milliseconds">000</div>
        <div class="label">Мс</div>
      </div>
    </div>

    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <p class="status" id="status">Синхронизация времени...</p>
  </main>

  <script>
    const targetDate = new Date("2026-08-25T00:00:00+04:00").getTime();
    const startDate = new Date("2026-01-01T00:00:00+04:00").getTime();

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const msEl = document.getElementById("milliseconds");
    const statusEl = document.getElementById("status");
    const progressBar = document.getElementById("progressBar");

    let internetTimeOffset = 0;

    async function syncInternetTime() {
      try {
        const response = await fetch("https://worldtimeapi.org/api/timezone/Asia/Baku");
        const data = await response.json();

        const internetTime = new Date(data.datetime).getTime();
        internetTimeOffset = internetTime - Date.now();

        statusEl.textContent = "Время синхронизировано через интернет";
      } catch (error) {
        statusEl.textContent = "Интернет-время недоступно, используется время устройства";
        internetTimeOffset = 0;
      }
    }

    function pad(number, length = 2) {
      return String(number).padStart(length, "0");
    }

    function updateCountdown() {
      const now = Date.now() + internetTimeOffset;
      let diff = targetDate - now;

      if (diff <= 0) {
        daysEl.textContent = "00";
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
        msEl.textContent = "000";
        statusEl.textContent = "Дата наступила!";
        progressBar.style.width = "100%";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      diff %= 1000 * 60 * 60 * 24;

      const hours = Math.floor(diff / (1000 * 60 * 60));
      diff %= 1000 * 60 * 60;

      const minutes = Math.floor(diff / (1000 * 60));
      diff %= 1000 * 60;

      const seconds = Math.floor(diff / 1000);
      const milliseconds = diff % 1000;

      daysEl.textContent = pad(days, 2);
      hoursEl.textContent = pad(hours, 2);
      minutesEl.textContent = pad(minutes, 2);
      secondsEl.textContent = pad(seconds, 2);
      msEl.textContent = pad(milliseconds, 3);

      const progress = ((now - startDate) / (targetDate - startDate)) * 100;
      progressBar.style.width = Math.min(Math.max(progress, 0), 100) + "%";

      requestAnimationFrame(updateCountdown);
    }

    syncInternetTime().then(() => {
      updateCountdown();
      setInterval(syncInternetTime, 60 * 1000);
    });
  </script>
</body>
</html>
